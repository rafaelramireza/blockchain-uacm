name: UACM Blockchain Smart Contract CI

# La pipeline se dispara automáticamente ante cualquier push o pull request a la rama main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    name: Compilación y Verificación Estática (Go)
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente desde el repositorio de GitHub al contenedor virtual de CI
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    # 2. Configurar el entorno oficial de Go
    - name: Configurar entorno de Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    # 3. Descargar y depurar el árbol de dependencias del módulo oficial de Fabric
    - name: Instalar y verificar dependencias
      run: |
        go mod download
        go mod tidy

    # 4. Auditoría Automatizada Anti-PII (Garantiza el cumplimiento del Criterio 4.5.1 de la Tesis)
    - name: Verificar exclusión de Datos Personales (PII)
      run: |
        echo "Validando que no existan etiquetas estructurales PII persistidas en CouchDB..."
        if grep -q 'json:"nom.*bre"' chaincode/*.go; then
          echo "ERR: Violación de privacidad detectada en el contrato inteligente."
          echo "Revisa el criterio de minimización de datos del Capítulo 4."
          exit 1
        fi

    # 5. Compilación Estática: Garantizar que no existan discrepancias en los Structs
    - name: Compilar Smart Contract (go build)
      run: go build -v ./...

    # 6. Verificación de Formato Oficial (Asegurar buenas prácticas de código limpio)
    - name: Verificar formato del código (go fmt)
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Error: Los siguientes archivos no cumplen con el formato oficial de Go:"
          gofmt -l .
          exit 1
        fi

    # 7. Pruebas Unitarias Dinámicas
    - name: Ejecutar Pruebas Unitarias
      run: go test -v ./...
