name: UACM Blockchain Smart Contract CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    name: Compilación y Verificación Estática (Go)
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Instalar y verificar dependencias
      run: |
        go mod download
        go mod tidy

    # 4. Auditoría Automatizada Anti-PII (Garantiza el cumplimiento del Criterio 4.5.1 de la Tesis)
    - name: Verificar exclusión de Datos Personales (PII)
      run: |
        echo "Validando exclusión de atributos PII en estructuras del World State..."
        # Buscamos de forma exacta la etiqueta de serialización JSON en el archivo del chaincode
        if grep -q 'json:"[n]ombre"' chaincode/egreso_contract.go; then
          echo "ERR: Violación de privacidad detectada en egreso_contract.go."
          echo "Se localizó el tag 'json:\"nombre\"' prohibido por el criterio de minimización del Capítulo 4."
          exit 1
        fi

    - name: Compilar Smart Contract (go build)
      run: go build -v ./...

    - name: Verificar formato del código (go fmt)
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Error: Los siguientes archivos no cumplen con el formato oficial de Go:"
          gofmt -l .
          exit 1
        fi

    - name: Ejecutar Pruebas Unitarias
      run: go test -v ./...
